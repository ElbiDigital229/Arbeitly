kind = "web"
previewPath = "/"
title = "Arbeitly"
version = "1.0.0"
id = "artifacts/arbeitly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25667
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/arbeitly run dev"

[services.env]
PORT = "25667"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/arbeitly", "run", "build"]
publicDir = "artifacts/arbeitly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
